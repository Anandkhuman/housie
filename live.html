<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sintha Sports Live</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#031b0f,#0a3d2a,#00a86b);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:1400px;
}

.header{
    text-align:center;
    margin-bottom:20px;
}

.header h1{
    color:#fff;
    font-size:42px;
    font-weight:700;
    letter-spacing:1px;
    text-shadow:0 0 15px rgba(0,255,170,.5);
}

.live{
    color:#ff2d2d;
}

.player-box{
    position:relative;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.15);
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 40px rgba(0,0,0,.4);
}

iframe{
    width:100%;
    height:80vh;
    border:none;
    background:#000;
}

.loader{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    background:#000;
    color:#fff;
    z-index:2;
}

.spinner{
    width:50px;
    height:50px;
    border:4px solid rgba(255,255,255,.2);
    border-top:4px solid #00ff99;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{transform:rotate(360deg);}
}

.fallback{
    display:none;
    margin-top:15px;
    text-align:center;
}

.fallback a{
    display:inline-block;
    padding:12px 20px;
    background:#00a86b;
    color:#fff;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
}

.footer{
    text-align:center;
    color:#d0fbe8;
    margin-top:15px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>Sintha Sports <span class="live">LIVE</span></h1>
    </div>

    <div class="player-box">

        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p style="margin-top:15px;">Loading Stream...</p>
        </div>

        <iframe
            id="liveFrame"
            src="https://sayanchannelcdn02.pages.dev/football/english"
            allow="autoplay; fullscreen; picture-in-picture"
            allowfullscreen>
        </iframe>

    </div>

    <div class="fallback" id="fallback">
        <a href="https://sayanchannelcdn02.pages.dev/football/english" target="_blank">
            Open Stream in New Tab
        </a>
    </div>

    <div class="footer">
        © 2026 Sintha Sports Live
    </div>

</div>

<script>
const frame = document.getElementById("liveFrame");
const loader = document.getElementById("loader");
const fallback = document.getElementById("fallback");

frame.onload = () => {
    loader.style.display = "none";
};

// Fallback after 10 seconds
setTimeout(() => {
    loader.style.display = "none";
    fallback.style.display = "block";
}, 10000);
</script>

</body>
</html>
