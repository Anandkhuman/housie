
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    
    <!-- Player के लिए सीएसएस -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
        }
        .player-box {
            width: 100%;
            max-width: 800px;
            background: #000;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .buttons {
            display: flex;
            width: 100%;
        }
        .buttons button {
            flex: 1;
            border: none;
            padding: 12px 5px;
            background: #1a1a1a;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .buttons button:hover {
            background-color: #333;
        }
        .buttons button.active {
            background: #e50914;
        }
        .buttons button span {
            display: block;
            font-size: 10px;
            font-weight: 400;
            margin-top: 2px;
        }
        video {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            display: block;
        }
        @media(max-width: 768px) {
            .buttons button {
                font-size: 12px;
                padding: 10px 3px;
            }
        }
    </style>
    
    <!-- HLS.js लाइब्रेरी -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

    <div class="player-box">
        <div class="buttons">
            <button class="active" onclick="loadPlayer(this, 'https://live.kooran53.cfd/goolato3.m3u8')">
                SERVER 1
                <span>Main</span>
            </button>
            <button onclick="loadPlayer(this, 'https://live05.msdht.app/live/14830711.m3u8')">
                SERVER 2
                <span>Backup</span>
            </button>
        </div>
        <video id="video" controls autoplay playsinline></video>
    </div>

    <!-- प्लेयर की कार्यक्षमता के लिए जावास्क्रिप्ट -->
    <script>
        var video = document.getElementById("video");
        var hls;

        function loadPlayer(button, videoSrc) {
            // सभी बटनों से 'active' क्लास हटा दें
            document.querySelectorAll(".buttons button").forEach(btn => {
                btn.classList.remove("active");
            });

            // क्लिक किए गए बटन पर 'active' क्लास जोड़ें
            button.classList.add("active");

            // यदि पिछला HLS उदाहरण मौजूद है तो उसे नष्ट कर दें
            if (hls) {
                hls.destroy();
            }

            // HLS समर्थन के लिए जाँच करें
            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(videoSrc);
                hls.attachMedia(video);
                video.play();
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = videoSrc;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            }
        }

        // प्रारंभ में पहला वीडियो लोड करें
        loadPlayer(
            document.querySelector(".buttons button.active"),
            "https://live.kooran53.cfd/goolato3.m3u8"
        );
    </script>

</body>
</html>
